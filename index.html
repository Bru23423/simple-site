<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Click Counter</title>

<style>
body{
    margin:0;
    height:100vh;
    background:#0f0f12;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    user-select:none;
    overflow:hidden;
}

.container{
    text-align:center;
    background:#18181d;
    padding:50px 70px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(0,0,0,0.6);
    position:relative;
    z-index:2;
}

#counter{
    font-size:60px;
    margin-bottom:20px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#3b3b45;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#505060;
}

/* click animation */

.click-effect{
    position:absolute;
    width:20px;
    height:20px;
    border-radius:50%;
    background:white;
    pointer-events:none;
    animation:pop 0.6s ease-out forwards;
}

@keyframes pop{
    0%{
        transform:scale(0);
        opacity:1;
    }
    70%{
        transform:scale(6);
        opacity:0.5;
    }
    100%{
        transform:scale(8);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="container">
<div id="counter">0</div>
<button onclick="setNumber(event)">Change Number</button>
</div>

<script>

let clicks = 0

function update(){
    // Display with commas
    document.getElementById("counter").innerText = clicks.toLocaleString()
}

document.body.addEventListener("click", function(e){

    if(e.target.tagName === "BUTTON") return

    clicks++
    update()

    // animation
    let effect = document.createElement("div")
    effect.className = "click-effect"
    effect.style.left = (e.clientX - 10) + "px"
    effect.style.top = (e.clientY - 10) + "px"

    document.body.appendChild(effect)

    setTimeout(()=>{
        effect.remove()
    },600)

})

function setNumber(event){

    event.stopPropagation()

    let num = prompt("Enter new number:")

    if(num !== null && !isNaN(num)){
        clicks = parseInt(num)
        update()
    }

}

</script>

</body>
</html>
