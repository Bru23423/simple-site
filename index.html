<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Click Counter</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f0f12;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
}

.container{
    text-align:center;
    background:#18181d;
    padding:40px;
    border-radius:18px;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
    width:320px;
}

h1{
    font-size:40px;
    margin-bottom:10px;
}

#counter{
    font-size:50px;
    margin:20px 0;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    background:#2c2c34;
    color:white;
    transition:0.2s;
}

button:hover{
    background:#3b3b45;
}

.clickBtn{
    background:#4f46e5;
}

.clickBtn:hover{
    background:#6366f1;
}
</style>
</head>

<body>

<div class="container">

<h1>Click Counter</h1>

<div id="counter">0</div>

<button class="clickBtn" onclick="clickButton()">CLICK</button>

<button onclick="buyAuto()">Auto Click (+1/sec) Cost: 50</button>

<button onclick="changeClicks()">Change Click Power</button>

</div>

<script>

let clicks = 0
let clickPower = 1
let autoClickers = 0

function update(){
    document.getElementById("counter").innerText = clicks
}

function clickButton(){
    clicks += clickPower
    update()
}

function buyAuto(){

    if(clicks >= 50){
        clicks -= 50
        autoClickers++
    }

    update()
}

function changeClicks(){

    let newPower = prompt("Enter clicks per click:")

    if(newPower && newPower > 0){
        clickPower = parseInt(newPower)
    }

}

setInterval(function(){

    clicks += autoClickers
    update()

},1000)

</script>

</body>
</html>
