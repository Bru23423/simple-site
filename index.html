<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Video Player</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:Poppins,sans-serif;
  color:white;
  text-align:center;
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  transition:background 0.5s;
  background-image: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa'); /* Space default */
}
.overlay{
  background: rgba(0,0,0,0.55);
  min-height:100vh;
  padding:40px 20px;
}
h1{ font-size:2.5em; margin-bottom:10px; }
input{
  width:400px;
  max-width:90%;
  padding:12px;
  border-radius:10px;
  border:none;
}
button{
  padding:10px 20px;
  margin:6px;
  border:none;
  border-radius:10px;
  background:#ff8c00;
  color:white;
  cursor:pointer;
  font-weight:600;
}
button:hover{ background:#ffa733; }
#themeIcon{
  position:fixed;
  top:20px;
  right:20px;
  font-size:24px;
  background:#000;
  border-radius:50%;
  width:45px;
  height:45px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:1000;
}
#themePanel{
  position:fixed;
  top:80px;
  right:20px;
  background:rgba(0,0,0,0.8);
  padding:15px;
  border-radius:12px;
  display:none;
  z-index:1000;
}
#playerBox{
  position:absolute;
  top:250px;
  left:50%;
  transform:translateX(-50%);
  width:640px;
  height:360px;
  border-radius:10px;
  overflow:hidden;
  cursor:move;
  resize:both;
  background:black;
  display:none; /* hidden by default */
}
#playerIframe{
  width:100%;
  height:calc(100% - 40px); /* leave space for audio slider */
  border:none;
}
#audioControl{
  width:90%;
  margin:5px auto;
  display:block;
}
footer{
  margin-top:120px;
  padding:20px;
  background:rgba(0,0,0,0.5);
}
a{ color:#ffd27f; text-decoration:none; }
</style>
</head>
<body>

<div id="themeIcon" onclick="toggleThemes()">🎨</div>

<div id="themePanel">
  <h3>Themes</h3>
  <button onclick="setTheme('safari')">Safari</button><br>
  <button onclick="setTheme('water')">Ocean</button><br>
  <button onclick="setTheme('space')">Space</button><br>
  <button onclick="setTheme('mountains')">Mountains</button><br>
  <button onclick="setTheme('city')">City</button>
</div>

<div class="overlay">
<h1>🎬 JustFun Viewer</h1>

<input id="url" placeholder="Paste YouTube link"><br>

<button onclick="showPlayer(); playVideo()">▶ Watch Video</button>
<button onclick="showPlayer(); playAudio()">🎧 Audio Only</button>
</div>

<div id="playerBox">
  <div id="playerIframe"></div>
  <input type="range" id="audioControl" min="0" max="100" value="65" onchange="setVolume()">
</div>

<footer>
<h3>Contact</h3>
<p>Email: <a href="mailto:Justfun.it.com@gmail.com">Justfun.it.com@gmail.com</a></p>
</footer>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player;
let currentVideoId = null;
let audioOnly = false;

function getVideoID(url){
  let id=null;
  if(url.includes("watch?v=")) id=url.split("v=")[1].split("&")[0];
  if(url.includes("youtu.be/")) id=url.split("youtu.be/")[1].split("?")[0];
  return id;
}

function onYouTubeIframeAPIReady(){
  player = new YT.Player('playerIframe', {
    width:'100%',
    height:'100%',
    videoId:'',
    playerVars:{'autoplay':0,'controls':1},
    events:{'onReady':onPlayerReady}
  });
}

function onPlayerReady(){
  setVolume();
}

function showPlayer(){
  document.getElementById('playerBox').style.display='block';
}

function playVideo(){
  let url=document.getElementById('url').value;
  let id=getVideoID(url);
  if(!id){ alert('Invalid YouTube link'); return; }
  currentVideoId=id;
  audioOnly=false;
  document.getElementById('playerBox').style.height='360px';
  player.loadVideoById(id);
  setVolume();
}

function playAudio(){
  let url=document.getElementById('url').value;
  let id=getVideoID(url);
  if(!id){ alert('Invalid YouTube link'); return; }
  currentVideoId=id;
  audioOnly=true;
  document.getElementById('playerBox').style.height='60px';
  player.loadVideoById(id);
  setVolume();
}

function setVolume(){
  if(player && player.setVolume){
    let vol = document.getElementById('audioControl').value;
    player.setVolume(vol);
  }
}

/* theme menu */
function toggleThemes(){
  let panel=document.getElementById('themePanel');
  panel.style.display = panel.style.display==='block'?'none':'block';
}

function setTheme(type){
  let url="";
  if(type==='safari') url='https://images.unsplash.com/photo-1501785888041-af3ef285b470';
  if(type==='water') url='https://images.unsplash.com/photo-1507525428034-b723cf961d3e';
  if(type==='space') url='https://images.unsplash.com/photo-1446776811953-b23d57bd21aa';
  if(type==='mountains') url='https://images.unsplash.com/photo-1500530855697-b586d89ba3ee';
  if(type==='city') url='https://images.unsplash.com/photo-1494526585095-c41746248156';
  document.body.style.backgroundImage="url("+url+")";
}

/* draggable */
let box=document.getElementById('playerBox');
let isDown=false;
let offset=[0,0];

box.addEventListener('mousedown',function(e){
  if(e.target.id!=="audioControl"){ // avoid dragging while adjusting volume
    isDown=true;
    offset=[box.offsetLeft - e.clientX, box.offsetTop - e.clientY];
  }
});

document.addEventListener('mouseup',function(){ isDown=false; });

document.addEventListener('mousemove',function(e){
  if(isDown){
    box.style.left=(e.clientX+offset[0])+'px';
    box.style.top=(e.clientY+offset[1])+'px';
  }
});
</script>

</body>
</html>
